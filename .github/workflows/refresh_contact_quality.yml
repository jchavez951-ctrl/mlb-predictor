name: Nightly Contact Quality Refresh

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run contact quality refresh
        run: python refresh_contact_quality.py

      - name: Commit and push updated contact quality data
        run: |
          git config user.name "contact-quality-refresh-bot"
          git config user.email "actions@github.com"
          git add MLB_Predictor/contact_quality.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Automated nightly contact quality refresh"
          git push
