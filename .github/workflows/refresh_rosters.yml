name: Nightly Roster Refresh

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run roster refresh
        run: python refresh_rosters.py

      - name: Commit and push updated roster data
        run: |
          git config user.name "roster-refresh-bot"
          git config user.email "actions@github.com"
          git add MLB_Predictor/roster_data.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Automated nightly roster refresh"
          git push
